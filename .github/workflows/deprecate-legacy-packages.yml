name: Deprecate legacy packages

on:
  workflow_dispatch:

jobs:
  deprecate:
    name: Mark legacy npm packages as deprecated
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Deprecate @koalarx/nest-cli and @koalarx/mcp-server
        run: bun scripts/deprecate-legacy-packages.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
