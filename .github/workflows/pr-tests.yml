name: PR TESTS

on:
  pull_request:
    branches: [main, develop]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      koala-nest: ${{ steps.filter.outputs.koala-nest }}
      docs: ${{ steps.filter.outputs.docs }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cli:
              - 'libs/cli/**'
              - 'scripts/build-cli.mjs'
            koala-nest:
              - 'libs/koala-nest/**'
              - 'scripts/build-koala-nest.mjs'
            docs:
              - 'libs/doc/**'
              - 'scripts/build-doc-manifest.mjs'
              - 'scripts/migrate-en-doc-slugs.mjs'
            shared:
              - 'package.json'
              - 'bun.lock'
              - 'scripts/build.mjs'
              - 'scripts/deprecate-legacy-packages.mjs'
              - '.github/workflows/pr-tests.yml'

  cli-unit-tests:
    name: CLI Unit Tests
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run CLI unit tests
        run: bun run test:cli

  koala-nest-unit-tests:
    name: Koala Nest Unit Tests
    needs: changes
    if: needs.changes.outputs.koala-nest == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install deps
        run: |
          bun install --frozen-lockfile
          cd libs/koala-nest && bun install --frozen-lockfile

      - name: Run koala-nest unit tests
        run: bun run test:koala-nest

  koala-nest-e2e-tests:
    name: Koala Nest E2E Tests
    needs: changes
    if: needs.changes.outputs.koala-nest == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: koala_nest
          PGDATA: /data/postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install deps
        run: |
          bun install --frozen-lockfile
          cd libs/koala-nest && bun install --frozen-lockfile

      - name: Run koala-nest e2e tests
        run: bun run test:koala-nest:e2e
        env:
          DATABASE_URL: postgresql://postgres:root@localhost:5432/koala_nest
          NODE_ENV: test

  cli-e2e-tests:
    name: CLI E2E Tests
    needs: changes
    if: >-
      needs.changes.outputs.cli == 'true' ||
      needs.changes.outputs.koala-nest == 'true' ||
      needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run CLI e2e tests
        run: bun run test:cli:e2e
        env:
          CI: '1'

  docs-tests:
    name: Docs Site Tests
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install docs site dependencies
        run: cd libs/doc/site && bun install --frozen-lockfile

      - name: Generate docs manifest
        run: bun run doc:manifest

      - name: Run unit tests
        run: bun run test:docs

      - name: Install Playwright Chromium
        run: cd libs/doc/site && bunx playwright install --with-deps chromium

      - name: Run e2e tests
        run: bun run test:docs:e2e
