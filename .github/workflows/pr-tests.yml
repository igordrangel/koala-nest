name: PR TESTS

on:
  pull_request:
    branches: [main]

jobs:
  lib-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install deps
        run: |
          bun install --frozen-lockfile
          cd libs/koala-nest && bun install --frozen-lockfile

      - name: Run lib unit tests
        run: bun run test
