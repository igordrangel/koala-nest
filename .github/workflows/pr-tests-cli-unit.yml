name: PR Tests — CLI Unit

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'libs/cli/**'
      - 'scripts/build-cli.mjs'
      - 'package.json'
      - 'bun.lock'
      - 'scripts/build.mjs'
      - 'scripts/deprecate-legacy-packages.mjs'
      - '.github/workflows/pr-tests-cli-unit.yml'

jobs:
  cli-unit-tests:
    name: CLI Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run CLI unit tests
        run: bun run test:cli
