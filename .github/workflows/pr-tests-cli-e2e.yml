name: PR Tests — CLI E2E

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'libs/cli/**'
      - 'libs/koala-nest/**'
      - 'scripts/build-cli.mjs'
      - 'scripts/build-koala-nest.mjs'
      - 'package.json'
      - 'bun.lock'
      - 'scripts/build.mjs'
      - 'scripts/deprecate-legacy-packages.mjs'
      - '.github/workflows/pr-tests-cli-e2e.yml'

jobs:
  cli-e2e-tests:
    name: CLI E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run CLI e2e tests
        run: bun run test:cli:e2e
        env:
          CI: '1'
