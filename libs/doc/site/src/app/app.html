<div class="flex flex-col px-5 lg:px-15 mx-auto overflow-x-hidden">
  <app-site-header
    class="fixed top-0 left-4 right-4 lg:left-15 lg:right-15 px-0 lg:px-0 lg:pl-5 z-10 box-border bg-base-100"
  />

  <div class="flex w-full">
    @if (isDocPage()) {
      <div class="fixed hidden lg:block left-5 lg:left-15 top-16 z-[5] w-60 h-[calc(100vh-4rem)]">
        <app-docs-sidebar class="block h-full" />
      </div>
    }

    <section [class]="mainSectionClass()">
      <div [class]="mainContentClass()">
        <router-outlet />
      </div>

      <app-site-footer [isDocPage]="isDocPage()" />
    </section>
  </div>

  <app-search-dialog />
</div>
