<ng-template #content>
  @if (copied()) {
    <i class="fa-solid fa-check" [class.text-success]="variant() === 'ghost'"></i>
    <span [class.text-success]="variant() === 'ghost'">{{ copiedLabel() }}</span>
  } @else {
    <i class="fa-regular fa-clipboard"></i>
    @if (shortLabel()) {
      <span class="sm:hidden">{{ shortLabel() }}</span>
      <span class="hidden sm:inline">{{ label() }}</span>
    } @else {
      {{ label() }}
    }
  }
</ng-template>

@if (variant() === 'ghost') {
  <button
    appButton
    btnSize="sm"
    btnVariant="ghost"
    (click)="copy()"
    [class]="'relative transition-colors whitespace-nowrap ' + class()"
    type="button"
  >
    <ng-container *ngTemplateOutlet="content" />
  </button>
} @else {
  <button
    (click)="copy()"
    [class]="
      'flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-base-300 bg-base-100 hover:bg-base-200 text-xs font-medium text-base-content/70 hover:text-base-content transition-colors cursor-pointer ' +
      class()
    "
    type="button"
  >
    <ng-container *ngTemplateOutlet="content" />
  </button>
}
